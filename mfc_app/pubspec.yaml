name: mfc_app
description: "MFC Vysočina — týmová aplikace"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.0
  web_socket_channel: ^3.0.1

  # State
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.0

  # Date/time
  intl: ^0.19.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Pretty UI
  google_fonts: ^8.1.0

  # Auto-update / file storage
  path_provider: ^2.1.4
  open_filex: ^4.5.0

  # Maps + URL handling
  url_launcher: ^6.3.0

  # Markdown rendering pro Pravidla
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true  # přepíše ic_launcher.png přímo, AndroidManifest se nemění
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#D32F2F"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/icon_foreground.png
