name: mfc_app
description: "MFC Vysočina — týmová aplikace"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.0
  web_socket_channel: ^3.0.1

  # State
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.0

  # Date/time
  intl: ^0.19.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Pretty UI
  google_fonts: ^6.2.1

  # Auto-update / file storage
  path_provider: ^2.1.4
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
