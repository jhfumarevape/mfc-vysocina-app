name: Build Android APK & Release

on:
  push:
    branches: [main]
    paths:
      - 'mfc_app/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write  # nutné pro vytvořeni Release

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mfc_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.7'

      - name: Install deps
        run: flutter pub get

      - name: Set up signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::No keystore secret — will fall back to debug signing."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          echo "Keystore set up."

      - name: Read app version
        id: ver
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          BUILD=${{ github.run_number }}
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER+$BUILD" >> "$GITHUB_OUTPUT"

      - name: Build APK (release, unsigned)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          WS_BASE_URL: ${{ vars.WS_BASE_URL }}
          PREVIEW_MODE: ${{ vars.PREVIEW_MODE }}
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL" \
            --dart-define=PREVIEW_MODE="$PREVIEW_MODE" \
            --dart-define=APP_VERSION="${{ steps.ver.outputs.version }}+${{ github.run_number }}"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/mfc-vysocina-${{ steps.ver.outputs.version }}.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mfc-vysocina-apk
          path: mfc_app/build/app/outputs/flutter-apk/mfc-vysocina-*.apk

      - name: Create GitHub Release with APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: |
            Automatický build z commitu `${{ github.sha }}`.

            **Stáhnout pro Android:** [mfc-vysocina-${{ steps.ver.outputs.version }}.apk](https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/mfc-vysocina-${{ steps.ver.outputs.version }}.apk)

            > APK je release-build, ale **bez vlastního klíče** (signed debug). Pro produkční vydání v Play Store potřebujeme upload keystore.
          files: mfc_app/build/app/outputs/flutter-apk/mfc-vysocina-*.apk
          draft: false
          prerelease: false
          make_latest: 'true'
