name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'mfc_app/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mfc_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.7'

      - name: Install deps
        run: flutter pub get

      - name: Build web (with base href for Pages)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
          WS_BASE_URL: ${{ vars.WS_BASE_URL }}
          PREVIEW_MODE: ${{ vars.PREVIEW_MODE }}
        run: |
          flutter build web --release \
            --base-href "/mfc-vysocina-app/" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=WS_BASE_URL="$WS_BASE_URL" \
            --dart-define=PREVIEW_MODE="$PREVIEW_MODE"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mfc_app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
