workflows:
  android-build:
    name: Android Build
    max_build_duration: 30
    environment:
      java: 17
      node: 18
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
